    <!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InfraJus — Calculadora de Precificação Pericial</title>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@500;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0B1F3A; --gold:#B08D2B; --gold-soft:#d9bf74; --cyan:#2AA9B8;
    --paper:#F7F5EF; --ink:#1A1A1A; --muted:#6b6f76; --line:#e3e0d6;
    --cobre-manchado: #3b2f28; /* Fundo global */
  }
  body{ margin:0; background-color: var(--cobre-manchado); color:var(--ink); font-family:'Inter',sans-serif; }
  .topbar{ background:var(--navy); color:#fff; padding:22px 32px; display:flex; justify-content:space-between; border-bottom:3px solid var(--gold); }
  .mark{ font-family:'Frank Ruhl Libre',serif; font-weight:700; font-size:22px; 
         background: linear-gradient(90deg, #B08D2B 0%, #d9bf74 50%, #B08D2B 100%); 
         background-size: 200% 100%; -webkit-background-clip: text; color: transparent; animation: shine 3s infinite linear; }
  @keyframes shine { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  .wrap{ max-width:1080px; margin:0 auto; padding:36px 24px; display:grid; grid-template-columns:1.15fr 0.85fr; gap:28px; align-items:start; }
  .panel{ background:var(--paper); border:1px solid #5a4a40; border-radius:2px; padding:28px 30px; }
  .field{margin-bottom:18px;}
  .field label{display:block; font-size:12.5px; font-weight:600; color:var(--navy); margin-bottom:6px; text-transform:uppercase;}
  .field input, .field select{width:100%; padding:10px; border:1px solid #cfcabb; background:#fffdf8;}
  .toggle button{padding:9px; border:1px solid #cfcabb; background:#fffdf8; cursor:pointer;}
  .toggle button.active{background:var(--navy); color:#fff;}
  
  /* PAINEL DE RESULTADOS COM IMAGEM */
  .results{ background: var(--navy) url('1000562281.jpg') no-repeat center center; background-size: cover; position: relative; color:#fff; }
  .results::after { content: ""; position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(11, 31, 58, 0.9); z-index:0; }
  .results > * { position:relative; z-index:1; }
  .line{display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.12);}
  .total-block{background:rgba(176,141,43,0.3); border:1px solid var(--gold); padding:18px; margin-top:18px;}
  .val{font-family:'IBM Plex Mono',monospace; font-weight:600;}
</style>
</head>
<body>
<div class="topbar"><div class="mark">InfraJus — Inteligência Pericial</div></div>
<div class="wrap">
  <div class="panel">
    <h2>Dados do caso</h2>
    <div class="field"><label>Nome do caso</label><input type="text" id="nomeCaso"></div>
    <div class="field"><label>Tipo de perícia</label><input list="tiposPericia" id="tipoPericia"><datalist id="tiposPericia"></datalist></div>
    <!-- ... (Continue colando o restante dos campos aqui) ... -->
          <div class="row2">
      <div class="field">
        <label for="tipoHora">Tipo de hora</label>
        <select id="tipoHora">
          <option value="Padrao">Padrão</option>
          <option value="Especializada">Especializada</option>
        </select>
      </div>
      <div class="field">
        <label for="complexidade">Complexidade</label>
        <select id="complexidade">
          <option value="Baixa">Baixa (1,0x)</option>
          <option value="Media">Média (1,3x)</option>
          <option value="Alta">Alta (1,6x)</option>
          <option value="Excepcional">Excepcional (2,0x)</option>
        </select>
      </div>
    </div>
    <div class="row2">
      <div class="field">
        <label for="horas">Horas técnicas estimadas</label>
        <input type="number" id="horas" min="0" step="0.5" value="10">
      </div>
      <div class="field">
        <label for="parcelas">Nº de parcelas do saldo</label>
        <input type="number" id="parcelas" min="1" step="1" value="6">
      </div>
    </div>
    <div class="field">
      <label>Caso urgente?</label>
      <div class="toggle">
        <button type="button" id="urgSim" onclick="setUrgencia(true)">Sim (+25%)</button>
        <button type="button" id="urgNao" class="active" onclick="setUrgencia(false)">Não</button>
      </div>
    </div>
    <details>
      <summary>Parâmetros avançados</summary>
      <div class="row2">
        <div class="field"><label for="valorHoraPadrao">Valor-hora padrão (R$)</label><input type="number" id="valorHoraPadrao" value="250"></div>
        <div class="field"><label for="valorHoraEspecializada">Valor-hora especializada (R$)</label><input type="number" id="valorHoraEspecializada" value="400"></div>
      </div>
    </details>
  </div>

  <div class="panel results">
    <h2>Resultado</h2>
    <div class="case-name" id="outCase">—</div>
    <div class="line"><span class="lbl">Valor-hora aplicado</span><span class="val" id="outValorHora">R$ 0</span></div>
    <div class="line"><span class="lbl">Multiplicador</span><span class="val" id="outMult">1,0x</span></div>
    <div class="line"><span class="lbl">Valor base</span><span class="val" id="outBase">R$ 0</span></div>
    <div class="line"><span class="lbl">Adicional urgência</span><span class="val" id="outUrg">R$ 0</span></div>
    <div class="total-block">
      <div class="lbl">Valor total da perícia</div>
      <div class="val" id="outTotal" style="font-size:28px;">R$ 0</div>
    </div>
    <div class="line"><span class="lbl">Entrada</span><span class="val" id="outEntrada">R$ 0</span></div>
    <div class="line"><span class="lbl">Saldo</span><span class="val" id="outSaldo">R$ 0</span></div>
    <div class="line"><span class="lbl">Parcela</span><span class="val" id="outParcela">R$ 0</span></div>
  </div>
</div>

<script>
  const MAPA_PERICIA = {
    "Perícia documentoscópica simples": {hora:"Padrao", complex:"Baixa"},
    "Perícia grafotécnica": {hora:"Padrao", complex:"Media"},
    "Perícia criminal": {hora:"Especializada", complex:"Alta"},
    "Prosopografia": {hora:"Especializada", complex:"Alta"},
    "Entomologia forense": {hora:"Especializada", complex:"Excepcional"}
  };
  const datalist = document.getElementById("tiposPericia");
  Object.keys(MAPA_PERICIA).forEach(n=>{ const o=document.createElement("option"); o.value=n; datalist.appendChild(o); });
  const $ = id => document.getElementById(id);
  let urgente = false;
  function setUrgencia(v){ urgente=v; $("urgSim").classList.toggle("active", v); $("urgNao").classList.toggle("active", !v); calcular(); }
  function moeda(v){ return v.toLocaleString('pt-BR', {style:'currency', currency:'BRL'}); }
  const MULT = {Baixa:1.0, Media:1.3, Alta:1.6, Excepcional:2.0};
  
  function calcular(){
    const nome = $("nomeCaso").value.trim();
    $("outCase").textContent = nome || "—";
    const vHora = $("tipoHora").value === "Especializada" ? parseFloat($("valorHoraEspecializada").value) : parseFloat($("valorHoraPadrao").value);
    const mult = MULT[$("complexidade").value] || 1.0;
    const base = parseFloat($("horas").value || 0) * vHora * mult;
    const urg = urgente ? base * 0.25 : 0;
    const total = base + urg;
    $("outValorHora").textContent = moeda(vHora);
    $("outMult").textContent = mult.toFixed(1).replace('.',',') + "x";
    $("outBase").textContent = moeda(base);
    $("outUrg").textContent = moeda(urg);
    $("outTotal").textContent = moeda(total);
    $("outEntrada").textContent = moeda(total * 0.6);
    $("outSaldo").textContent = moeda(total * 0.4);
    $("outParcela").textContent = moeda((total * 0.4) / parseInt($("parcelas").value || 1));
  }
  ["tipoHora","complexidade","horas","parcelas","valorHoraPadrao","valorHoraEspecializada","nomeCaso"].forEach(id => $(id).addEventListener("input", calcular));
  calcular();
</script>
</body>
</html>
