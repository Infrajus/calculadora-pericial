<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Precificação — InfraJus</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Inter:wght@300;400;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-dark: #1a1a1a;
    --grafite: #2d2d2d;
    --cobre: #b87333;
    --ouro: #d4af37;
    --creme: #e0d8c3;
    --input-bg: #222;
  }
  body { background: var(--bg-dark); color: var(--creme); font-family: 'Inter', sans-serif; padding: 20px; margin: 0; }
  
  h1 { text-align: center; font-family: 'Cormorant Garamond'; color: var(--cobre); margin-bottom: 30px; font-size: 2.2rem; }
  
  .wrap { max-width: 900px; margin: 0 auto; display: grid; grid-template-columns: 1fr; gap: 20px; }
  @media (min-width: 768px) { .wrap { grid-template-columns: 1fr 350px; } }

  .panel { background: var(--grafite); padding: 25px; border-radius: 10px; border: 1px solid var(--cobre); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
  h2 { font-family: 'Cormorant Garamond'; color: var(--ouro); border-bottom: 1px solid var(--cobre); padding-bottom: 10px; margin-top: 0; }

  .field { margin-bottom: 15px; }
  label { display: block; font-size: 0.85rem; color: var(--creme); margin-bottom: 5px; }
  input, select { width: 100%; padding: 12px; background: var(--input-bg); border: 1px solid var(--cobre); color: var(--creme); border-radius: 5px; box-sizing: border-box; }
  
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  
  .toggle { display: flex; gap: 10px; margin-top: 5px; }
  button { flex: 1; padding: 10px; border: 1px solid var(--cobre); background: var(--input-bg); color: var(--creme); cursor: pointer; border-radius: 5px; }
  button.active { background: var(--cobre); color: white; }

  .results { position: sticky; top: 20px; text-align: center; }
  .line { display: flex; justify-content: space-between; padding: 8px 0; font-size: 0.9rem; border-bottom: 1px solid #333; }
  .val { font-family: 'IBM Plex Mono'; color: var(--ouro); font-weight: 600; }
  .total-block { margin-top: 20px; padding: 20px; border: 2px solid var(--cobre); border-radius: 50%; width: 160px; height: 160px; margin: 20px auto; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .total-val { font-family: 'IBM Plex Mono'; font-size: 1.8rem; color: var(--ouro); }
</style>
</head>
<body>

<h1>Calculadora de Precificação Pericial</h1>

<div class="wrap">
  <div class="panel">
    <h2>Dados do Caso</h2>
    <div class="field"><label>Nome do Caso</label><input type="text" id="nomeCaso"></div>
    <div class="field"><label>Tipo de Perícia</label><input list="tiposPericia" id="tipoPericia"><datalist id="tiposPericia"></datalist></div>
    <div class="row2">
      <div class="field"><label>Tipo de Hora</label><select id="tipoHora"><option value="Padrao">Padrão</option><option value="Especializada">Especializada</option></select></div>
      <div class="field"><label>Complexidade</label><select id="complexidade"><option value="Baixa">Baixa (1.0x)</option><option value="Media">Média (1.3x)</option><option value="Alta">Alta (1.6x)</option><option value="Excepcional">Excepcional (2.0x)</option></select></div>
    </div>
    <div class="row2">
      <div class="field"><label>Horas Técnicas</label><input type="number" id="horas" value="10"></div>
      <div class="field"><label>Nº Parcelas</label><input type="number" id="parcelas" value="6"></div>
    </div>
    <div class="field"><label>Caso urgente?</label><div class="toggle"><button type="button" id="urgSim" onclick="setUrgencia(true)">Sim</button><button type="button" id="urgNao" class="active" onclick="setUrgencia(false)">Não</button></div></div>
  </div>

  <div class="panel results">
    <h2>Total</h2>
    <div class="total-block">
      <span style="font-size: 0.7rem; text-transform: uppercase;">Valor Total</span>
      <span class="total-val" id="outTotal">R$ 0</span>
    </div>
    <div class="line"><span>Entrada</span><span class="val" id="outEntrada">R$ 0</span></div>
    <div class="line"><span>Parcela</span><span class="val" id="outParcela">R$ 0</span></div>
  </div>
</div>

<script>
  const MAPA_PERICIA = {"Perícia documentoscópica simples": {hora:"Padrao", complex:"Baixa"}, "Perícia grafotécnica": {hora:"Padrao", complex:"Media"}, "Perícia criminal": {hora:"Especializada", complex:"Alta"}};
  const datalist = document.getElementById("tiposPericia");
  Object.keys(MAPA_PERICIA).forEach(n => { let o = document.createElement("option"); o.value = n; datalist.appendChild(o); });

  let urgente = false;
  const $ = id => document.getElementById(id);

  function setUrgencia(v){
    urgente = v;
    $("urgSim").classList.toggle("active", v);
    $("urgNao").classList.toggle("active", !v);
    calcular();
  }

  function calcular(){
    const h = parseFloat($("horas").value || 0);
    const vHora = ($("tipoHora").value === "Especializada" ? 400 : 250);
    const m = {"Baixa":1.0, "Media":1.3, "Alta":1.6, "Excepcional":2.0}[$("complexidade").value];
    let total = h * vHora * m;
    if(urgente) total *= 1.25;
    $("outTotal").textContent = "R$ " + total.toFixed(0);
    $("outEntrada").textContent = "R$ " + (total * 0.6).toFixed(0);
    $("outParcela").textContent = "R$ " + ((total * 0.4) / parseInt($("parcelas").value || 1)).toFixed(0);
  }

  document.querySelectorAll('input, select').forEach(el => el.addEventListener('input', calcular));
  calcular();
</script>
</body>
</html>
