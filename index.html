<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
Calculadora de Precificação Pericial InfraJus
</title>


<link href="https://fonts.googleapis.com/css2?family=Allura&family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">


<style>

:root{

--camurca-escuro:#513321;
--camurca:#68452E;
--camurca-claro:#896042;

--cobre:#A66A3F;
--cobre-claro:#D2A06A;
--bronze:#8B572F;
--dourado:#C9A15B;

--marrom-texto:#332016;
--creme:#F3DFC3;

--sombra:
rgba(25,12,5,.45);

}



*{

box-sizing:border-box;

}



body{

margin:0;

min-height:100vh;

font-family:'Inter',sans-serif;

color:var(--marrom-texto);


background:

radial-gradient(
circle at 15% 10%,
rgba(255,220,170,.12),
transparent 35%
),

radial-gradient(
circle at 85% 80%,
rgba(0,0,0,.20),
transparent 45%
),

linear-gradient(
135deg,
#68452E,
#513321,
#80583B
);


}




/* =====================
   CABEÇALHO
===================== */


.topbar{

padding:32px 45px;

display:flex;

justify-content:space-between;

align-items:center;

flex-wrap:wrap;

gap:20px;


background:

linear-gradient(
145deg,
rgba(38,21,13,.97),
rgba(74,43,25,.96)
);


border-bottom:

2px solid var(--cobre-claro);


box-shadow:

0 15px 40px rgba(0,0,0,.35);

}




.logo-area{

display:flex;

flex-direction:column;

}




.logo{

font-family:'Allura',cursive;

font-size:58px;

line-height:.9;

color:

var(--cobre-claro);


text-shadow:

0 3px 10px rgba(0,0,0,.45);

}



.logo-title{

font-family:'Cormorant Garamond',serif;

font-size:27px;

font-weight:700;

letter-spacing:2px;

text-transform:uppercase;

color:#E8C99A;

margin-top:12px;


}



.logo-sub{

font-size:11px;

letter-spacing:5px;

text-transform:uppercase;

color:#D8B88A;

margin-top:5px;

}




.tag{

font-size:12px;

letter-spacing:3px;

text-transform:uppercase;

color:#E7CCAA;

}




/* =====================
   ÁREA PRINCIPAL
===================== */


.wrap{

max-width:1200px;

margin:auto;

padding:45px 25px 70px;


display:grid;

grid-template-columns:

1.05fr .95fr;


gap:35px;

}




@media(max-width:900px){

.wrap{

grid-template-columns:1fr;

}

}




/* =====================
   PAINÉIS
===================== */


.panel{


background:

linear-gradient(
145deg,
rgba(205,160,110,.78),
rgba(139,91,50,.72)
);



border:

2px solid rgba(210,160,106,.75);



border-radius:22px;



padding:35px;




box-shadow:


0 25px 50px var(--sombra),


inset 0 2px 5px rgba(255,240,210,.35);



backdrop-filter:blur(8px);


}




.panel h2{

font-family:'Cormorant Garamond',serif;

font-size:34px;

margin:0 0 10px;

color:#332016;

}

/* =====================
   CAMPOS PREMIUM
===================== */


.field{

margin-bottom:20px;

}



.field label{


display:block;


font-size:12px;


font-weight:700;


letter-spacing:1.1px;


text-transform:uppercase;


color:#3D2618;


margin-bottom:5px;



}



.field input,

.field select{


width:100%;


padding:15px 17px;


border-radius:14px;



border:

2px solid var(--cobre-claro);



background:


linear-gradient(
145deg,
#E3BE90,
#B98250
);



color:#332016;



font-size:15px;



box-shadow:


inset 4px 4px 8px rgba(83,47,22,.25),


inset -4px -4px 8px rgba(255,238,205,.55),


0 8px 15px rgba(45,25,12,.25);



transition:.3s;



}




.field input:focus,

.field select:focus{


outline:none;


border-color:#F0C98B;



box-shadow:


0 0 0 4px rgba(210,160,106,.30),


inset 3px 3px 8px rgba(60,30,15,.25);



}





.row2{


display:grid;


grid-template-columns:1fr 1fr;


gap:20px;



}



@media(max-width:550px){


.row2{


grid-template-columns:1fr;


}


}





.hint{


font-size:12px;


color:#6B3E20;


margin-top:5px;


font-style:italic;


}





/* =====================
   BOTÕES
===================== */


.toggle{


display:flex;


gap:15px;


}



.toggle button{


flex:1;


padding:14px;


border-radius:14px;



border:

2px solid var(--cobre);



background:

linear-gradient(
145deg,
#D7AE7A,
#9C6236
);



color:#3A2416;


font-weight:700;


cursor:pointer;



box-shadow:


0 7px 15px rgba(0,0,0,.2),


inset 1px 1px 3px rgba(255,255,255,.5);



transition:.3s;



}



.toggle button:hover{


transform:translateY(-2px);


}



.toggle button.active{


background:

linear-gradient(
135deg,
#A66A3F,
#D2A06A
);



color:white;


}





details{


margin-top:30px;


padding-top:20px;


border-top:

1px solid rgba(90,55,30,.35);


}



summary{


cursor:pointer;


font-weight:700;


font-size:12px;


letter-spacing:1px;


text-transform:uppercase;


color:#55311E;


}






/* =====================
   FORMULÁRIO
===================== */


<div class="wrap">


<div class="panel">


<h2>
Dados do caso
</h2>


<p class="sub">

Preencha os dados técnicos para estimativa de honorários periciais.

</p>




<div class="field">


<label>
Nome do caso / cliente
</label>


<input
type="text"
id="nomeCaso"
placeholder="Ex.: Silva vs. Silva — TJPR">


</div>





<div class="field">


<label>
Tipo de perícia
</label>


<input
list="tiposPericia"
id="tipoPericia"
placeholder="Digite ou selecione...">


<datalist id="tiposPericia"></datalist>


<div class="hint" id="hintPericia"></div>


</div>





<div class="row2">


<div class="field">


<label>
Tipo de hora
</label>


<select id="tipoHora">


<option value="Padrao">
Hora técnica padrão
</option>


<option value="Especializada">
Hora técnica especializada
</option>


</select>


</div>





<div class="field">


<label>
Complexidade
</label>


<select id="complexidade">


<option value="Baixa">
Baixa (1,0x)
</option>


<option value="Media">
Média (1,3x)
</option>


<option value="Alta">
Alta (1,6x)
</option>


<option value="Excepcional">
Excepcional (2,0x)
</option>


</select>


</div>


</div>





<div class="row2">


<div class="field">


<label>
Horas técnicas estimadas
</label>


<input
type="number"
id="horas"
value="10"
min="0"
step="0.5">


</div>





<div class="field">


<label>
Número de parcelas
</label>


<input
type="number"
id="parcelas"
value="6"
min="1">


</div>


</div>




<div class="field">


<label>
Caso urgente?
</label>


<div class="toggle">


<button
type="button"
id="urgSim"
onclick="setUrgencia(true)">
Sim +25%
</button>



<button
type="button"
id="urgNao"
class="active"
onclick="setUrgencia(false)">
Não
</button>



</div>


</div>
   

.sub{

font-size:14px;

line-height:1.7;

color:#4D3020;

margin-bottom:30px;

}
   
<details>

<summary>
Parâmetros avançados
</summary>


<div class="row2">


<div class="field">

<label>
Valor hora padrão
</label>


<input
id="valorHoraPadrao"
type="number"
value="250">


</div>




<div class="field">

<label>
Valor hora especializada
</label>


<input
id="valorHoraEspecializada"
type="number"
value="400">


</div>


</div>




<div class="row2">


<div class="field">

<label>
Entrada (%)
</label>


<input
id="percEntrada"
type="number"
value="60">


</div>




<div class="field">

<label>
Piso mínimo
</label>


<input
id="pisoMinimo"
type="number"
value="800">


</div>


</div>


</details>


</div>





<!-- PAINEL DE RESULTADO -->


<div class="panel resultado">



<img
src="Screenshot_20260708_121250_Chrome.jpg"
class="marca-justica"
alt="Símbolo da Justiça">



<div class="conteudo">


<h2>
Resultado da Precificação
</h2>


<p class="sub">
Composição técnica dos honorários periciais.
</p>




<div class="case-name" id="outCase">
—
</div>





<div class="linha">

<span>
Valor hora aplicado
</span>

<strong id="outValorHora">
R$ 0
</strong>


</div>





<div class="linha">

<span>
Multiplicador técnico
</span>

<strong id="outMult">
1,0x
</strong>


</div>





<div class="linha">

<span>
Valor base
</span>

<strong id="outBase">
R$ 0
</strong>


</div>





<div class="linha">

<span>
Adicional de urgência
</span>

<strong id="outUrg">
R$ 0
</strong>


</div>






<div class="total-premium">


<span>
Valor total da perícia
</span>


<strong id="outTotal">
R$ 0
</strong>


</div>







<div class="pagamento">


<h3>
Estrutura de pagamento
</h3>




<div class="linha">

<span>
Entrada inicial
</span>

<strong id="outEntrada">
R$ 0
</strong>


</div>



<div class="linha">

<span>
Saldo remanescente
</span>

<strong id="outSaldo">
R$ 0
</strong>


</div>



<div class="linha">

<span>
Valor de cada parcela
</span>

<strong id="outParcela">
R$ 0
</strong>


</div>



</div>






<div class="observacao">

Este cálculo representa uma referência técnica baseada em horas, especialização, complexidade e responsabilidade profissional.

</div>



</div>


</div>


</div>




<script>


const MAPA_PERICIA = {


"Perícia documentoscópica simples":
{
hora:"Padrao",
complex:"Baixa",
dica:"Análise documental objetiva."
},


"Perícia grafotécnica":
{
hora:"Padrao",
complex:"Media",
dica:"Comparação gráfica e análise técnica."
},


"Perícia criminal / laudo complementar":
{
hora:"Especializada",
complex:"Alta",
dica:"Metodologias técnicas complementares."
},


"Prosopografia / reconhecimento facial":
{
hora:"Especializada",
complex:"Alta",
dica:"Análise facial comparativa."
},


"Entomologia forense":
{
hora:"Especializada",
complex:"Excepcional",
dica:"Área especializada."
},


"Fotogrametria":
{
hora:"Especializada",
complex:"Alta",
dica:"Reconstrução técnica."
}


};




const $ = id => document.getElementById(id);



Object.keys(MAPA_PERICIA).forEach(nome=>{

let option =
document.createElement("option");

option.value=nome;

$("tiposPericia")
.appendChild(option);


});




let urgente=false;




function setUrgencia(valor){


urgente=valor;


$("urgSim")
.classList.toggle("active",valor);


$("urgNao")
.classList.toggle("active",!valor);


calcular();


}





function moeda(valor){


return Number(valor)
.toLocaleString(
"pt-BR",
{
style:"currency",
currency:"BRL"
}
);


}




const MULT={

Baixa:1,

Media:1.3,

Alta:1.6,

Excepcional:2

};






$("tipoPericia")
.addEventListener(
"input",
e=>{


let item =
MAPA_PERICIA[e.target.value];


if(item){


$("tipoHora").value=item.hora;


$("complexidade").value=item.complex;


$("hintPericia").textContent =
"Parâmetro sugerido: "
+
item.dica;


}


calcular();


});







[
"tipoHora",
"complexidade",
"horas",
"parcelas",
"valorHoraPadrao",
"valorHoraEspecializada",
"percEntrada",
"pisoMinimo",
"nomeCaso"

]
.forEach(id=>{


$(id)
.addEventListener(
"input",
calcular
);


});






function calcular(){



$("outCase").textContent =
$("nomeCaso").value || "—";




let hora =

$("tipoHora").value==="Especializada"

?

Number(
$("valorHoraEspecializada").value
)

:

Number(
$("valorHoraPadrao").value
);





let mult =

MULT[$("complexidade").value]
||1;





let base =

Number($("horas").value)

*

hora

*

mult;





let urg =

urgente

?

base*.25

:

0;





let total =

Math.max(

base+urg,

Number($("pisoMinimo").value)

);





let entrada =

total *

(Number($("percEntrada").value)/100);





let saldo =

total-entrada;





let parcela =

saldo /

Math.max(
Number($("parcelas").value),
1
);





$("outValorHora").textContent =
moeda(hora);


$("outMult").textContent =
mult.toFixed(1).replace(".",",")+"x";


$("outBase").textContent =
moeda(base);


$("outUrg").textContent =
moeda(urg);


$("outTotal").textContent =
moeda(total);


$("outEntrada").textContent =
moeda(entrada);


$("outSaldo").textContent =
moeda(saldo);


$("outParcela").textContent =
moeda(parcela);


}




calcular();


</script>


</body>

</html>
