    <!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InfraJus — Calculadora de Precificação Pericial</title>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@500;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0B1F3A;
    --navy-soft:#132a4d;
    --gold:#B08D2B;
    --gold-soft:#d9bf74;
    --cyan:#2AA9B8;
    --ink:#1A1A1A;
    --muted:#6b6f76;
    --line:#e3e0d6;
  }
  body{
    margin:0;
    /* Imagem de fundo aplicada aqui */
    background: url('https://i.imgur.com/vH3y1Kz.jpg') no-repeat center center fixed;
    background-size: cover;
    color:var(--ink);
    font-family:'Inter',sans-serif;
  }
  .topbar{
    background:rgba(11, 31, 58, 0.9);
    color:#fff;
    padding:22px 32px;
    border-bottom:3px solid var(--gold);
  }
  .wrap{max-width:1080px; margin:0 auto; padding:36px 24px; display:grid; grid-template-columns:1.15fr 0.85fr; gap:28px;}
  .panel{background:rgba(255,255,255,0.95); border:1px solid var(--line); padding:28px; border-radius:2px;}
  
  /* Área de Resultados com a Estátua */
  .results{
    position:sticky; top:24px;
    background:var(--navy);
    color:#fff;
    border:none;
    overflow: hidden;
    position: relative;
  }
  /* Inserindo a estátua apenas no painel de resultados */
  .results::after {
    content: "";
    position: absolute;
    right: 0; bottom: 0;
    width: 200px; height: 350px;
    background: url('https://i.imgur.com/vH3y1Kz.jpg') no-repeat right bottom;
    background-size: contain;
    opacity: 0.15;
    pointer-events: none;
  }
  
  .results h2, .results .sub, .results .line, .results .total-block { position: relative; z-index: 1; }
  
  /* ... Restante do seu CSS original (campos, botões, etc) mantém o mesmo ... */
  .field{margin-bottom:18px;}
  .field label{display:block; font-size:12px; font-weight:600; color:var(--navy); margin-bottom:6px;}
  .field input, .field select{width:100%; padding:10px; border:1px solid #ccc; border-radius:2px;}
  .row2{display:grid; grid-template-columns:1fr 1fr; gap:16px;}
  .total-block{margin-top:18px; padding:18px; background:rgba(176,141,43,0.2); border:1px solid var(--gold);}
  .val{font-family:'IBM Plex Mono',monospace; font-weight:600;}
</style>
</head>
<body>

<div class="topbar">
  <div style="font-family:'Frank Ruhl Libre'; font-size:22px; font-weight:700;">Infra<span>Jus</span></div>
</div>

<div class="wrap">
  <div class="panel">
    <h2>Dados do caso</h2>
    <div class="field"><label>Nome do caso</label><input type="text" id="nomeCaso"></div>
    </div>

  <div class="panel results">
    <h2>Resultado</h2>
    <div class="line"><span class="lbl">Total da perícia</span><span class="val" id="outTotal">R$ 0</span></div>
    </div>
</div>

<script>
  // Seu script JS continua funcional aqui
</script>
</body>
</html>
