    <!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InfraJus — Calculadora de Precificação Pericial</title>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@500;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0B1F3A; --navy-soft:#132a4d; --gold:#B08D2B; --gold-soft:#d9bf74;
    --cyan:#2AA9B8; --paper:#F7F5EF; --card:#FFFFFF; --ink:#1A1A1A;
    --muted:#6b6f76; --line:#e3e0d6; --cobre-escuro:#3b2f28;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background-color: var(--cobre-escuro);
    color:var(--ink);
    font-family:'Inter',sans-serif;
  }
  .topbar{
    background:var(--navy); color:#fff; padding:22px 32px;
    display:flex; align-items:baseline; justify-content:space-between;
    border-bottom:3px solid var(--gold);
  }
  .mark{
    font-family:'Frank Ruhl Libre',serif; font-weight:700; font-size:22px;
    background: linear-gradient(90deg, #B08D2B 0%, #d9bf74 50%, #B08D2B 100%);
    background-size: 200% 100%; -webkit-background-clip: text; color: transparent;
    animation: shine 3s infinite linear;
  }
  @keyframes shine { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  .wrap{max-width:1080px; margin:0 auto; padding:36px 24px 60px; display:grid; grid-template-columns:1.15fr 0.85fr; gap:28px;}
  @media (max-width:820px){.wrap{grid-template-columns:1fr;}}
  .panel{background:var(--paper); border-radius:2px; padding:28px 30px;}
  .panel h2{font-family:'Frank Ruhl Libre',serif; font-size:19px; margin:0 0 15px; color:var(--navy);}
  .field{margin-bottom:18px;}
  .field label{display:block; font-size:12.5px; font-weight:600; color:var(--navy); margin-bottom:6px; text-transform:uppercase;}
  .field input,.field select{width:100%; padding:10px 12px; border:1px solid #cfcabb; background:#fffdf8;}
  .toggle{display:flex; gap:10px;}
  .toggle button{flex:1; padding:9px; border:1px solid #cfcabb; background:#fffdf8; cursor:pointer;}
  .toggle button.active{background:var(--navy); color:#fff;}
  
  /* Resultado com a Imagem */
  .results{
    position:sticky; top:24px; color:#fff; border:none;
    background: var(--navy) url('1000562281.jpg') no-repeat center center;
    background-size: cover; position: relative; overflow: hidden;
  }
  .results::after {
    content: ""; position: absolute; top:0; left:0; width:100%; height:100%;
    background: rgba(11, 31, 58, 0.90); z-index:0;
  }
  .results > * { position:relative; z-index:1; }
  .results h2{color:#fff;}
  .line{display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.12);}
  .val{font-family:'IBM Plex Mono',monospace; font-weight:600;}
  .total-block{margin-top:18px; padding:18px; background:rgba(176,141,43,0.2); border:1px solid var(--gold);}
</style>
</head>
<body>

<div class="topbar">
  <div class="mark">InfraJus — Inteligência Pericial</div>
</div>

<div class="wrap">
  <div class="panel">
    <h2>Dados do caso</h2>
    <div class="field"><label>Nome do caso</label><input type="text" id="nomeCaso"></div>
    <div class="field"><label>Tipo de perícia</label><input list="tiposPericia" id="tipoPericia"><datalist id="tiposPericia"></datalist></div>
    <div class="field"><label>Tipo de hora</label><select id="tipoHora"><option value="Padrao">Padrão</option><option value="Especializada">Especializada</option></select></div>
    <div class="field"><label>Horas</label><input type="number" id="horas" value="10"></div>
  </div>

  <div class="panel results">
    <h2>Resultado</h2>
    <div class="line"><span>Valor-hora</span><span class="val" id="outValorHora">R$ 0</span></div>
    <div class="line"><span>Complexidade</span><span class="val" id="outMult">1,0x</span></div>
    <div class="total-block">
      <div class="val" id="outTotal" style="font-size:28px;">R$ 0</div>
    </div>
  </div>
</div>

<script>
  const MAPA_PERICIA = {
    "Perícia grafotécnica": {hora:"Padrao", complex:"Media"},
    "Perícia criminal": {hora:"Especializada", complex:"Alta"}
  };
  const $ = id => document.getElementById(id);
  function moeda(v){ return v.toLocaleString('pt-BR', {style:'currency', currency:'BRL'}); }
  
  function calcular(){
    const vHora = $("tipoHora").value === "Especializada" ? 400 : 250;
    const total = parseFloat($("horas").value) * vHora;
    $("outValorHora").textContent = moeda(vHora);
    $("outTotal").textContent = moeda(total);
  }
  
  $("tipoHora").addEventListener("input", calcular);
  $("horas").addEventListener("input", calcular);
  calcular();
</script>
</body>
</html>
