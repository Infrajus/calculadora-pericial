    <!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InfraJus — Calculadora de Precificação</title>
<style>
  :root {
    --navy: #0B1F3A;
    --gold: #B08D2B;
    --paper: #F7F5EF;
  }
  
  body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    /* Fundo de textura aplicado via CSS com gradiente sobreposto para legibilidade */
    background: linear-gradient(rgba(247, 245, 239, 0.9), rgba(247, 245, 239, 0.9)), 
                url('https://www.transparenttextures.com/patterns/leather.png');
    padding: 20px;
  }

  .wrap { max-width: 1080px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

  .panel { background: #fff; padding: 25px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }

  /* PAINEL DE RESULTADOS COM A ESTÁTUA */
  .results {
    background: var(--navy);
    color: #fff;
    position: relative;
    overflow: hidden;
    /* A imagem da estátua está aqui, aplicada via estilo inline ou CSS */
    background-image: url('https://i.imgur.com/H6zS2lQ.jpeg'); /* Imagem correta da estátua */
    background-size: cover;
    background-position: center;
  }
  
  /* Filtro escuro sobre a imagem para o texto ficar legível */
  .results::before {
    content: "";
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(11, 31, 58, 0.92);
  }

  /* Conteúdo acima do filtro */
  .results > * { position: relative; z-index: 1; }

  @media (max-width: 820px) { .wrap { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div class="wrap">
  <!-- FORMULÁRIO -->
  <div class="panel">
    <h2>Dados do caso</h2>
    <!-- Seus campos de input aqui -->
  </div>

  <!-- RESULTADO -->
  <div class="panel results">
    <h2>Resultado</h2>
    <div style="font-size: 32px; font-weight: bold; color: var(--gold);">
      Total: R$ 0,00
    </div>
    <!-- Restante dos seus dados -->
  </div>
</div>

</body>
</html>
